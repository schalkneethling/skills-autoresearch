<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Account Settings</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        font-family: system-ui, sans-serif;
        font-size: 1rem;
        line-height: 1.5;
        color: #1a1a1a;
        background: #f5f5f5;
        margin: 0;
        padding: 0;
      }

      .skip-link {
        position: absolute;
        transform: translateY(-100%);
        background: #0052cc;
        color: #fff;
        padding: 0.5rem 1rem;
        text-decoration: none;
        z-index: 100;
      }

      .skip-link:focus {
        transform: translateY(0);
      }

      header {
        background: #fff;
        border-bottom: 1px solid #ddd;
        padding: 1rem 2rem;
      }

      header h1 {
        margin: 0;
        font-size: 1.25rem;
      }

      main {
        max-width: 680px;
        margin: 2rem auto;
        padding: 0 1rem;
      }

      .settings-form {
        display: flex;
        flex-direction: column;
        gap: 2rem;
      }

      fieldset {
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 1.5rem;
        margin: 0;
      }

      legend {
        font-size: 1.125rem;
        font-weight: 600;
        padding: 0 0.5rem;
        color: #1a1a1a;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 0.375rem;
        margin-top: 1.25rem;
      }

      .field:first-of-type {
        margin-top: 0.75rem;
      }

      label {
        font-weight: 500;
        font-size: 0.9375rem;
      }

      input[type="text"],
      textarea {
        border: 1px solid #ccc;
        border-radius: 4px;
        padding: 0.5rem 0.75rem;
        font-size: 1rem;
        font-family: inherit;
        width: 100%;
      }

      input[type="text"]:focus,
      textarea:focus {
        outline: 2px solid #0052cc;
        outline-offset: 1px;
        border-color: #0052cc;
      }

      textarea {
        min-height: 100px;
        resize: vertical;
      }

      input[type="file"] {
        font-size: 0.9375rem;
      }

      .hint {
        font-size: 0.875rem;
        color: #555;
        margin: 0;
      }

      /* Toggle switch */
      .toggle-field {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin-top: 1.25rem;
      }

      .toggle-field label {
        font-weight: 400;
        cursor: pointer;
      }

      input[type="checkbox"].toggle {
        width: 2.75rem;
        height: 1.5rem;
        appearance: none;
        background: #ccc;
        border-radius: 9999px;
        cursor: pointer;
        position: relative;
        flex-shrink: 0;
        transition: background 0.2s;
      }

      input[type="checkbox"].toggle::after {
        content: "";
        position: absolute;
        top: 3px;
        left: 3px;
        width: 1.125rem;
        height: 1.125rem;
        background: #fff;
        border-radius: 50%;
        transition: transform 0.2s;
      }

      input[type="checkbox"].toggle:checked {
        background: #0052cc;
      }

      input[type="checkbox"].toggle:checked::after {
        transform: translateX(1.25rem);
      }

      input[type="checkbox"].toggle:focus {
        outline: 2px solid #0052cc;
        outline-offset: 2px;
      }

      /* Radio and checkbox groups */
      .radio-group,
      .checkbox-group {
        display: flex;
        flex-direction: column;
        gap: 0.625rem;
        margin-top: 0.75rem;
      }

      .radio-option,
      .checkbox-option {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .radio-option label,
      .checkbox-option label {
        font-weight: 400;
        cursor: pointer;
      }

      input[type="radio"],
      input[type="checkbox"]:not(.toggle) {
        width: 1rem;
        height: 1rem;
        cursor: pointer;
        flex-shrink: 0;
      }

      /* Danger Zone */
      .danger-zone {
        background: #fff8f8;
        border: 1px solid #f5c6cb;
        border-radius: 8px;
        padding: 1.5rem;
        margin: 0;
      }

      .danger-zone legend {
        color: #c0392b;
      }

      .danger-zone p {
        margin: 0.75rem 0 1.25rem;
        font-size: 0.9375rem;
        color: #555;
      }

      .btn-danger {
        background: #c0392b;
        color: #fff;
        border: none;
        border-radius: 4px;
        padding: 0.625rem 1.25rem;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
      }

      .btn-danger:focus {
        outline: 2px solid #c0392b;
        outline-offset: 3px;
      }

      .btn-danger:hover {
        background: #a93226;
      }

      /* Save Changes */
      .form-actions {
        display: flex;
        justify-content: flex-end;
      }

      .btn-primary {
        background: #0052cc;
        color: #fff;
        border: none;
        border-radius: 4px;
        padding: 0.75rem 1.75rem;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
      }

      .btn-primary:focus {
        outline: 2px solid #0052cc;
        outline-offset: 3px;
      }

      .btn-primary:hover {
        background: #0041a3;
      }
    </style>
  </head>
  <body>
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <header>
      <p>MyApp</p>
    </header>

    <main id="main-content" tabindex="-1">
      <h1>Account Settings</h1>

      <form class="settings-form" method="post" action="/settings" aria-labelledby="account-settings-heading">
        <!-- Profile -->
        <fieldset>
          <legend>Profile</legend>

          <div class="field">
            <label for="display-name">Display name</label>
            <input
              type="text"
              id="display-name"
              name="display_name"
              value="Miriam Okonkwo"
              autocomplete="nickname"
            />
          </div>

          <div class="field">
            <label for="bio">Bio</label>
            <textarea id="bio" name="bio" rows="4">Product designer and amateur astrophotographer. I write occasionally about design systems and the night sky.</textarea>
          </div>

          <div class="field">
            <label for="avatar">Profile picture</label>
            <p id="avatar-hint" class="hint">JPG, PNG or GIF. Maximum file size 2 MB.</p>
            <input
              type="file"
              id="avatar"
              name="avatar"
              accept="image/jpeg,image/png,image/gif"
              aria-describedby="avatar-hint"
            />
          </div>
        </fieldset>

        <!-- Notifications -->
        <fieldset>
          <legend>Notifications</legend>

          <div class="toggle-field">
            <input
              type="checkbox"
              class="toggle"
              id="email-notifications"
              name="email_notifications"
              checked
            />
            <label for="email-notifications">Email notifications</label>
          </div>

          <div class="toggle-field">
            <input
              type="checkbox"
              class="toggle"
              id="push-notifications"
              name="push_notifications"
            />
            <label for="push-notifications">Push notifications</label>
          </div>

          <fieldset style="border: none; padding: 0; margin-top: 1.5rem;">
            <legend style="font-size: 0.9375rem; font-weight: 500; padding: 0; margin-bottom: 0.5rem;">Notification frequency</legend>
            <div class="radio-group">
              <div class="radio-option">
                <input
                  type="radio"
                  id="freq-instant"
                  name="notification_frequency"
                  value="instant"
                  checked
                />
                <label for="freq-instant">Instant</label>
              </div>
              <div class="radio-option">
                <input
                  type="radio"
                  id="freq-daily"
                  name="notification_frequency"
                  value="daily_digest"
                />
                <label for="freq-daily">Daily Digest</label>
              </div>
              <div class="radio-option">
                <input
                  type="radio"
                  id="freq-weekly"
                  name="notification_frequency"
                  value="weekly_digest"
                />
                <label for="freq-weekly">Weekly Digest</label>
              </div>
            </div>
          </fieldset>
        </fieldset>

        <!-- Privacy -->
        <fieldset>
          <legend>Privacy</legend>

          <fieldset style="border: none; padding: 0; margin-top: 0.75rem;">
            <legend style="font-size: 0.9375rem; font-weight: 500; padding: 0; margin-bottom: 0.5rem;">Profile visibility</legend>
            <div class="radio-group">
              <div class="radio-option">
                <input
                  type="radio"
                  id="visibility-public"
                  name="profile_visibility"
                  value="public"
                  checked
                />
                <label for="visibility-public">Public</label>
              </div>
              <div class="radio-option">
                <input
                  type="radio"
                  id="visibility-friends"
                  name="profile_visibility"
                  value="friends_only"
                />
                <label for="visibility-friends">Friends Only</label>
              </div>
              <div class="radio-option">
                <input
                  type="radio"
                  id="visibility-private"
                  name="profile_visibility"
                  value="private"
                />
                <label for="visibility-private">Private</label>
              </div>
            </div>
          </fieldset>

          <div class="checkbox-group" style="margin-top: 1.5rem;">
            <div class="checkbox-option">
              <input
                type="checkbox"
                id="show-online-status"
                name="show_online_status"
                checked
              />
              <label for="show-online-status">Show online status</label>
            </div>
            <div class="checkbox-option">
              <input
                type="checkbox"
                id="search-engine-index"
                name="search_engine_index"
              />
              <label for="search-engine-index">Allow search engines to index my profile</label>
            </div>
          </div>
        </fieldset>

        <!-- Danger Zone -->
        <fieldset class="danger-zone">
          <legend>Danger Zone</legend>
          <p>Permanently delete your account and all associated data. This action cannot be undone.</p>
          <button type="button" class="btn-danger">Delete Account</button>
        </fieldset>

        <!-- Save -->
        <div class="form-actions">
          <button type="submit" class="btn-primary">Save Changes</button>
        </div>
      </form>
    </main>
  </body>
</html>
