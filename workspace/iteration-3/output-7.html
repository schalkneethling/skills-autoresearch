<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Account Settings</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      .skip-link {
        position: absolute;
        transform: translateY(-100%);
        background: #000;
        color: #fff;
        padding: 0.5rem 1rem;
        z-index: 100;
        text-decoration: none;
      }

      .skip-link:focus {
        transform: translateY(0);
      }

      body {
        font-family: system-ui, sans-serif;
        line-height: 1.5;
        color: #1a1a1a;
        background: #f5f5f5;
        margin: 0;
        padding: 0;
      }

      header {
        background: #fff;
        border-bottom: 1px solid #e0e0e0;
        padding: 1rem 2rem;
      }

      header h1 {
        margin: 0;
        font-size: 1.25rem;
      }

      main {
        max-width: 720px;
        margin: 2rem auto;
        padding: 0 1rem;
      }

      fieldset {
        background: #fff;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        padding: 1.5rem;
        margin-bottom: 1.5rem;
      }

      legend {
        font-size: 1.125rem;
        font-weight: 600;
        padding: 0 0.5rem;
      }

      .field {
        margin-bottom: 1.25rem;
      }

      .field:last-child {
        margin-bottom: 0;
      }

      label {
        display: block;
        font-weight: 500;
        margin-bottom: 0.375rem;
      }

      input[type="text"],
      input[type="file"],
      textarea {
        width: 100%;
        padding: 0.5rem 0.75rem;
        border: 1px solid #ccc;
        border-radius: 4px;
        font: inherit;
        font-size: 1rem;
      }

      textarea {
        min-height: 100px;
        resize: vertical;
      }

      .toggle-field {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin-bottom: 1rem;
      }

      .toggle-field:last-child {
        margin-bottom: 0;
      }

      .toggle-field label {
        margin: 0;
        font-weight: 400;
      }

      input[type="checkbox"] {
        width: 1.25rem;
        height: 1.25rem;
        cursor: pointer;
        flex-shrink: 0;
      }

      .radio-group {
        display: flex;
        flex-direction: column;
        gap: 0.625rem;
        margin-top: 0.5rem;
      }

      .radio-option {
        display: flex;
        align-items: center;
        gap: 0.625rem;
      }

      .radio-option label {
        margin: 0;
        font-weight: 400;
      }

      input[type="radio"] {
        width: 1.125rem;
        height: 1.125rem;
        cursor: pointer;
        flex-shrink: 0;
      }

      .danger-zone {
        background: #fff5f5;
        border-color: #fca5a5;
      }

      .danger-zone legend {
        color: #b91c1c;
      }

      .danger-zone p {
        margin: 0 0 1rem;
        color: #7f1d1d;
        font-size: 0.9375rem;
      }

      .btn {
        padding: 0.625rem 1.25rem;
        font: inherit;
        font-size: 1rem;
        font-weight: 500;
        border-radius: 4px;
        cursor: pointer;
      }

      .btn-primary {
        background: #2563eb;
        color: #fff;
        border: 1px solid #1d4ed8;
      }

      .btn-primary:hover {
        background: #1d4ed8;
      }

      .btn-danger {
        background: #fff;
        color: #b91c1c;
        border: 2px solid #b91c1c;
      }

      .btn-danger:hover {
        background: #fef2f2;
      }

      .form-actions {
        display: flex;
        justify-content: flex-end;
        margin-top: 0.5rem;
      }
    </style>
  </head>
  <body>
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <header>
      <h1>My Account</h1>
    </header>

    <main id="main-content" tabindex="-1">
      <!-- h2 inside main assumes this page has h1 "My Account" in the header above;
           each fieldset legend acts as the section heading for its group of controls. -->
      <h2 class="visually-hidden">Account Settings</h2>

      <form aria-label="Account settings" method="post">

        <!-- Profile -->
        <fieldset>
          <legend>Profile</legend>

          <div class="field">
            <label for="display-name">Display name</label>
            <input type="text" id="display-name" name="display_name" autocomplete="nickname" />
          </div>

          <div class="field">
            <label for="bio">Bio</label>
            <textarea id="bio" name="bio" rows="4"></textarea>
          </div>

          <div class="field">
            <label for="avatar">Avatar</label>
            <input type="file" id="avatar" name="avatar" accept="image/*" />
          </div>
        </fieldset>

        <!-- Notifications -->
        <fieldset>
          <legend>Notifications</legend>

          <div class="toggle-field">
            <input type="checkbox" id="email-notifications" name="email_notifications" />
            <label for="email-notifications">Email notifications</label>
          </div>

          <div class="toggle-field">
            <input type="checkbox" id="push-notifications" name="push_notifications" />
            <label for="push-notifications">Push notifications</label>
          </div>

          <!-- Nested fieldset for the radio group within Notifications -->
          <fieldset style="border: none; padding: 0; margin: 1rem 0 0;">
            <legend style="font-size: 1rem; font-weight: 500; padding: 0;">Notification frequency</legend>
            <div class="radio-group">
              <div class="radio-option">
                <input type="radio" id="freq-instant" name="notification_frequency" value="instant" checked />
                <label for="freq-instant">Instant</label>
              </div>
              <div class="radio-option">
                <input type="radio" id="freq-daily" name="notification_frequency" value="daily_digest" />
                <label for="freq-daily">Daily Digest</label>
              </div>
              <div class="radio-option">
                <input type="radio" id="freq-weekly" name="notification_frequency" value="weekly_digest" />
                <label for="freq-weekly">Weekly Digest</label>
              </div>
            </div>
          </fieldset>
        </fieldset>

        <!-- Privacy -->
        <fieldset>
          <legend>Privacy</legend>

          <!-- Nested fieldset for profile visibility radios -->
          <fieldset style="border: none; padding: 0; margin-bottom: 1.25rem;">
            <legend style="font-size: 1rem; font-weight: 500; padding: 0;">Profile visibility</legend>
            <div class="radio-group">
              <div class="radio-option">
                <input type="radio" id="visibility-public" name="profile_visibility" value="public" checked />
                <label for="visibility-public">Public</label>
              </div>
              <div class="radio-option">
                <input type="radio" id="visibility-friends" name="profile_visibility" value="friends_only" />
                <label for="visibility-friends">Friends Only</label>
              </div>
              <div class="radio-option">
                <input type="radio" id="visibility-private" name="profile_visibility" value="private" />
                <label for="visibility-private">Private</label>
              </div>
            </div>
          </fieldset>

          <div class="toggle-field">
            <input type="checkbox" id="show-online-status" name="show_online_status" />
            <label for="show-online-status">Show online status</label>
          </div>

          <div class="toggle-field">
            <input type="checkbox" id="search-index" name="search_index" />
            <label for="search-index">Allow search engines to index my profile</label>
          </div>
        </fieldset>

        <!-- Danger Zone -->
        <fieldset class="danger-zone">
          <legend>Danger Zone</legend>
          <p>Permanently delete your account and all associated data. This action cannot be undone.</p>
          <button type="button" class="btn btn-danger">Delete Account</button>
        </fieldset>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Save Changes</button>
        </div>

      </form>
    </main>
  </body>
</html>
